name: CancerCompass Link Checker

on:
  schedule:
    - cron: '0 8 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check all resource links
        id: check
        run: |
          node << 'EOF'
          const https = require('https');
          const http = require('http');
          const fs = require('fs');
          const { URL } = require('url');

          const src = fs.readFileSync('src/data/resources.js', 'utf8');
          const matches = [...src.matchAll(/\{ id:"([^"]+)", name:"([^"]+)"[^}]*url:"([^"]+)"/g)];
          const resources = matches.map(m => ({id: m[1], name: m[2], url: m[3]}));
          console.log('Total resources to check: ' + resources.length);

          function checkUrl(resource) {
            return new Promise((resolve) => {
              let url;
              try { url = new URL(resource.url); } catch(e) {
                return resolve({ ...resource, status: 'INVALID', result: 'broken', note: 'Invalid URL' });
              }
              const protocol = url.protocol === 'https:' ? https : http;
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'GET',
                timeout: 15000,
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.5',
                  'Connection': 'close'
                }
              };
              const req = protocol.request(options, (res) => {
                const status = res.statusCode;
                if ([301,302,307,308].includes(status) && res.headers.location) {
                  resolve({ ...resource, status, result: 'ok', note: 'Redirects' });
                } else if (status >= 200 && status < 400) {
                  resolve({ ...resource, status, result: 'ok', note: '' });
                } else {
                  resolve({ ...resource, status, result: 'broken', note: 'HTTP ' + status });
                }
                res.resume();
              });
              req.on('timeout', () => { req.destroy(); resolve({ ...resource, status: 'TIMEOUT', result: 'broken', note: 'Timed out' }); });
              req.on('error', (err) => resolve({ ...resource, status: 'ERROR', result: 'broken', note: err.message }));
              req.end();
            });
          }

          async function runChecks() {
            const broken = [], working = [];
            for (const resource of resources) {
              process.stdout.write('Checking: ' + resource.name + '... ');
              const result = await checkUrl(resource);
              if (result.result === 'broken') { console.log('BROKEN (' + result.status + ')'); broken.push(result); }
              else { console.log('OK (' + result.status + ')'); working.push(result); }
              await new Promise(r => setTimeout(r, 400));
            }
            console.log('\n========================================');
            console.log('CANCERCOMPASS LINK CHECK COMPLETE');
            console.log('Date: ' + new Date().toLocaleDateString('en-US'));
            console.log('Total: ' + resources.length + ' | Working: ' + working.length + ' | Broken: ' + broken.length);
            console.log('========================================\n');
            if (broken.length > 0) {
              console.log('BROKEN LINKS REQUIRING ACTION:');
              broken.forEach(r => { console.log('\n- ' + r.name); console.log('  URL: ' + r.url); console.log('  Issue: ' + r.note); });
              fs.writeFileSync('broken-links.json', JSON.stringify(broken, null, 2));
              process.exit(1);
            } else {
              console.log('All links verified working. No action needed.');
              process.exit(0);
            }
          }
          runChecks().catch(err => { console.error('Check failed:', err); process.exit(1); });
          EOF

      - name: Send email if broken links found
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "CancerCompass — Broken Links Found"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: CancerCompass Link Checker
          body: |
            Your CancerCompass link check found broken links.
            Check the GitHub Actions log for the full list:
            https://github.com/${{ github.repository }}/actions

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "CancerCompass — All Links Verified Working"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: CancerCompass Link Checker
          body: |
            Your CancerCompass link check is complete.
            All resource links are verified working as of today.
